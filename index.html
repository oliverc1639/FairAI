<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClauseLens — Educational Legal Document Transparency</title>
  <style>
    :root{
      --bg: #0b0f17;
      --panel: rgba(255,255,255,0.06);
      --panel2: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.12);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);
      --muted2: rgba(255,255,255,0.55);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --radius: 18px;

      --accent: #7c5cff;
      --accent2:#18c1ff;
      --good:#35d07f;
      --warn:#ffcc66;
      --bad:#ff5c7a;

      --hl-arb: rgba(124,92,255,0.28);
      --hl-fee: rgba(255,204,102,0.26);
      --hl-ren: rgba(24,193,255,0.22);
      --hl-waiv: rgba(255,92,122,0.22);
      --hl-term: rgba(53,208,127,0.20);
      --hl-rent: rgba(255,255,255,0.14);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(124,92,255,0.18), transparent 60%),
        radial-gradient(900px 700px at 80% 30%, rgba(24,193,255,0.14), transparent 55%),
        radial-gradient(700px 500px at 50% 90%, rgba(53,208,127,0.10), transparent 60%),
        var(--bg);
      min-height:100vh;
    }

    a{ color:inherit; text-decoration:none; }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:26px 18px 60px;
    }

    /* Top bar */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:14px 16px;
      border:1px solid var(--border);
      background: var(--panel);
      border-radius: 999px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 14px;
      z-index: 20;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 210px;
    }
    .logo{
      width:38px;height:38px;border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 14px 30px rgba(124,92,255,0.25);
      position: relative;
      overflow:hidden;
    }
    .logo:after{
      content:"";
      position:absolute; inset:-40%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.55), transparent 55%);
      transform: rotate(10deg);
    }
    .brand h1{
      font-size:14px;
      margin:0;
      letter-spacing:0.3px;
    }
    .brand p{
      margin:0;
      font-size:12px;
      color: var(--muted);
    }

    .search{
      flex:1;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      min-width: 200px;
    }
    .search input{
      width:100%;
      border:none;
      outline:none;
      background: transparent;
      color: var(--text);
      font-size:13px;
    }
    .kbd{
      font-family: var(--mono);
      font-size:11px;
      color: var(--muted2);
      border:1px solid var(--border);
      border-bottom-color: rgba(255,255,255,0.22);
      padding:4px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      white-space:nowrap;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .btn{
      border:1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding:10px 12px;
      border-radius: 999px;
      font-size:13px;
      cursor:pointer;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
      display:inline-flex;
      align-items:center;
      gap:8px;
      user-select:none;
    }
    .btn:hover{ background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.18); }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      background: linear-gradient(135deg, rgba(124,92,255,0.90), rgba(24,193,255,0.75));
      border-color: transparent;
      box-shadow: 0 18px 45px rgba(124,92,255,0.22);
    }
    .chip{
      border:1px solid var(--border);
      background: rgba(255,255,255,0.05);
      padding:8px 10px;
      border-radius: 999px;
      font-size:12px;
      color: var(--muted);
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }
    .dot{
      width:9px; height:9px;
      border-radius:999px;
      background: var(--good);
      box-shadow: 0 0 0 4px rgba(53,208,127,0.10);
    }

    /* Hero */
    .hero{
      margin-top: 18px;
      display:grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap:18px;
      align-items: stretch;
    }
    .card{
      border:1px solid var(--border);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow:hidden;
    }
    .heroMain{
      padding:22px 22px 18px;
      position:relative;
    }
    .heroMain:before{
      content:"";
      position:absolute;
      inset:-1px;
      background: radial-gradient(900px 260px at 10% 0%, rgba(124,92,255,0.24), transparent 60%),
                  radial-gradient(760px 220px at 90% 15%, rgba(24,193,255,0.18), transparent 55%);
      pointer-events:none;
      opacity:0.9;
    }
    .heroMain > *{ position:relative; }
    .heroTitle{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
    }
    .heroTitle h2{
      margin:0 0 6px;
      font-size:22px;
      letter-spacing:0.2px;
    }
    .heroTitle p{
      margin:0;
      color: var(--muted);
      line-height:1.45;
      font-size:13.5px;
      max-width: 62ch;
    }

    .banner{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .pill{
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.18);
      padding:8px 10px;
      border-radius: 999px;
      font-size:12px;
      color: var(--muted);
      display:flex;
      gap:8px;
      align-items:center;
    }
    .pill b{ color: var(--text); font-weight:600; }
    .pill .tag{
      font-family: var(--mono);
      font-size:11px;
      border:1px solid rgba(255,255,255,0.16);
      padding:3px 7px;
      border-radius: 999px;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.05);
    }

    /* Upload */
    .uploadZone{
      margin-top:16px;
      border:1.5px dashed rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.18);
      padding:16px;
      border-radius: 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .uploadLeft{
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .uploadIcon{
      width:40px;height:40px;border-radius: 14px;
      display:grid;place-items:center;
      background: rgba(255,255,255,0.06);
      border:1px sol
